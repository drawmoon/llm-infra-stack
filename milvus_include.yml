services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      # - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_QUOTA_BACKEND_BYTES=8589934592
      - ETCD_SNAPSHOT_COUNT=50000
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_DATA_DIR=/etcd
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    # networks:
    #   - milvus-net
    networks:
      - db-net
    restart: always
    profiles: [ "milvus" ]

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    # ports:
    #   - "9001:9001"
    #   - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
    # networks:
    #   - milvus-net
    networks:
      - db-net
    restart: always
    profiles: [ "milvus" ]

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: [ "milvus", "run", "standalone" ]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530" # SDK 连接端口
      - "9091:9091" # API/监控端口
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8G # 根据你 16G 内存的宿主机分配 50%
        reservations:
          memory: 4G
    # networks:
    #   - milvus-net
    networks:
      - db-net
    restart: always
    profiles: [ "milvus" ]

  attu:
    container_name: milvus-attu
    image: docker.io/zilliz/attu:v2.4.11
    environment:
      MILVUS_URL: milvus-standalone:19530
      # NODE_OPTIONS: "--max-old-space-size=512" # 高并发下响应慢时，可以调整 Node.js 的内存上限
    ports:
      - 3000:3000
      # - 13000:3000
    depends_on:
      standalone: { condition: service_healthy }
    deploy:
      resources:
        limits:
          # cpus: "0.5"
          memory: 1G
        reservations:
          memory: 256M
    # networks:
    #   - milvus-net
    networks:
      - db-net
    restart: always
    profiles: [ "milvus" ]

# networks:
